 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscribe Section</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color: #efefef;
}

.subscribe-section {
    text-align: center;
    padding: 100px 20px;
}

.subscribe-section h1 {
    font-size: 70px;
    color: #cfcfcf;
    letter-spacing: 3px;
    margin-bottom: 40px;
}

.subscribe-box {
    display: inline-flex;
    border: 1px solid #000;
}

.subscribe-box input {
    padding: 12px 15px;
    width: 300px;
    border: none;
    outline: none;
    font-size: 14px;
}

.subscribe-box button {
    padding: 12px 25px;
    border: none;
    background-color: #1f2730;
    color: #fff;
    font-weight: bold;
    letter-spacing: 2px;
    cursor: pointer;
}

.subscribe-box button:hover {
    background-color: #333;
}
</style>
</head>

<body>

<div class="subscribe-section">
    <h1>SUBSCRIBE US</h1>
    <div class="subscribe-box">
        <input type="email" placeholder="Write your email address here...">
        <button>SUBSCRIBE</button>
    </div>
</div>

</body>
</html>
